name: CI Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: ../actions/setup-node
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: ../actions/setup-node
      - run: npm run typecheck
